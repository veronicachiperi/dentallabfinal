[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/clinic"
  to = "/clinic.html"
  status = 200

[[redirects]]
  from = "/case"
  to = "/case.html"
  status = 200
