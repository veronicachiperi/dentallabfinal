<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup conturi — PRIVATE CAD</title>
  <link rel="stylesheet" href="css/styles.css?v=terms-friendly-20260522">
  <style>
    body{background:var(--bg-page);padding:32px;font-family:inherit}
    .setup-box{max-width:600px;margin:0 auto;background:var(--bg);border:0.5px solid var(--border);border-radius:10px;padding:28px}
    .setup-title{font-size:18px;font-weight:500;margin:0 0 6px}
    .setup-sub{font-size:13px;color:var(--text-muted);margin:0 0 24px}
    .setup-section{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-dim);margin:20px 0 8px;padding-bottom:4px;border-bottom:0.5px solid var(--border)}
    .user-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--border)}
    .user-row:last-child{border-bottom:none}
    .user-name{flex:1;font-size:13px;font-weight:500}
    .user-role{font-size:11px;color:var(--text-muted)}
    .user-status{font-size:12px;font-weight:500;min-width:80px;text-align:right}
    .status-ok{color:#1D9E75}
    .status-err{color:#A32D2D}
    .status-wait{color:var(--text-muted)}
    .pass-row{display:flex;gap:10px;align-items:flex-end;margin-bottom:20px}
    .pass-row .field{flex:1;margin:0}
    .warn-box{background:#FAEEDA;border:0.5px solid #BA7517;border-radius:6px;padding:12px;font-size:12px;color:#7A4D0A;margin-bottom:20px}
    #authGuard{text-align:center;padding:60px 20px;color:var(--text-muted);font-size:14px}
  </style>
</head>
<body>
<div class="setup-box">
  <div id="authGuard">Se verifică autentificarea...</div>
  <div id="setupContent" style="display:none">
    <div class="setup-title">Creare conturi utilizatori</div>
    <div class="setup-sub">Rulează o singură dată pentru a crea toate conturile în Supabase.</div>

    <div class="warn-box">
      ⚠ Setează o parolă temporară. Utilizatorii vor schimba parola la prima autentificare.
    </div>

    <div class="pass-row">
      <div class="field">
        <label>Parolă temporară (min. 8 caractere)</label>
        <input type="password" id="defaultPass" placeholder="Introduceți parola temporară" autocomplete="new-password">
      </div>
      <button class="btn primary" id="startBtn" type="button">Creează toate conturile</button>
    </div>

    <div id="userList"></div>
    <div id="doneMsg" style="display:none;margin-top:20px;padding:14px;background:#EAF3DE;border-radius:6px;font-size:13px;color:#27500A;font-weight:500">
      ✓ Toate conturile au fost create. <a href="login.html" style="color:#1D9E75">Mergi la autentificare →</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/data.js?v=terms-friendly-20260522"></script>
<script src="js/supabase.js"></script>
<script>
const USERS = [
  { username: 'VeronicaChiperi',    role: 'admin',      section: 'Admin' },
  { username: 'TimofeiChiochiu',    role: 'technician', employeeId: 'tchi', section: 'Design' },
  { username: 'VadimCelac',         role: 'technician', employeeId: 'vcel', section: 'Design' },
  { username: 'IvanKara',           role: 'technician', employeeId: 'ikar', section: 'Design' },
  { username: 'AlinaCurtis',        role: 'clinic',     clinicId: 'acur', section: 'Ceramică' },
  { username: 'ValentinGrajdianu',  role: 'technician', employeeId: 'vgra', section: 'Ceramică' },
  { username: 'AlexandruMoisei',    role: 'technician', employeeId: 'amoi', section: 'Composite' },
  { username: 'AlexandruVarzari',   role: 'technician', employeeId: 'avar', section: 'Composite' },
  { username: 'CRISDENT',           role: 'clinic',     clinicId: 'crisdent', section: 'Clinici' },
  { username: 'FAVDENTAL',          role: 'clinic',     clinicId: 'fav',      section: 'Clinici' },
  { username: 'MELIANCLINIC',       role: 'clinic',     clinicId: 'melian',   section: 'Clinici' },
  { username: 'DENTALESTHETICS',    role: 'clinic',     clinicId: 'esthetic', section: 'Clinici' },
  { username: 'ELITEMED',           role: 'clinic',     clinicId: 'elite',    section: 'Clinici' },
  { username: 'PANADENT',           role: 'clinic',     clinicId: 'pana',     section: 'Clinici' },
];

async function checkAdminAuth() {
  const guard = document.getElementById('authGuard');
  const content = document.getElementById('setupContent');
  if (!SUPABASE_CONFIGURED) {
    guard.innerHTML = 'Supabase nu este configurat.';
    return;
  }
  const prof = await sbRequireAuth();
  if (!prof) {
    guard.innerHTML = '<p>Trebuie să fii autentificat.</p><a class="btn primary" href="login.html">Autentificare</a>';
    return;
  }
  if (prof.role !== 'admin') {
    guard.innerHTML = '<p>Acces permis doar administratorilor.</p><a class="btn" href="index.html">Înapoi</a>';
    return;
  }
  guard.style.display = 'none';
  content.style.display = 'block';
  renderList([]);
}

function renderList(statuses) {
  const root = document.getElementById('userList');
  let html = '';
  let lastSection = '';
  USERS.forEach((u, i) => {
    if (u.section !== lastSection) {
      html += `<div class="setup-section">${u.section}</div>`;
      lastSection = u.section;
    }
    const st = statuses[i] || { cls: 'status-wait', label: '—' };
    html += `<div class="user-row">
      <div>
        <div class="user-name">${u.username}</div>
        <div class="user-role">${u.role}${u.employeeId ? ' · ' + u.employeeId : ''}${u.clinicId ? ' · ' + u.clinicId : ''}</div>
      </div>
      <div class="user-status ${st.cls}">${st.label}</div>
    </div>`;
  });
  root.innerHTML = html;
}

document.getElementById('startBtn').addEventListener('click', async () => {
  const pass = document.getElementById('defaultPass').value.trim();
  if (pass.length < 8) { alert('Parola trebuie să aibă minim 8 caractere.'); return; }

  document.getElementById('startBtn').disabled = true;
  document.getElementById('startBtn').textContent = 'Se creează...';

  const statuses = USERS.map(() => ({ cls: 'status-wait', label: 'în așteptare' }));
  renderList(statuses);

  for (let i = 0; i < USERS.length; i++) {
    const u = USERS[i];
    statuses[i] = { cls: 'status-wait', label: '...' };
    renderList(statuses);
    try {
      await sbSignUp(u.username, pass, u.role, u.clinicId || null, u.employeeId || null);
      statuses[i] = { cls: 'status-ok', label: '✓ creat' };
    } catch (e) {
      const msg = e.message || '';
      if (msg.toLowerCase().includes('already') || msg.toLowerCase().includes('exist')) {
        statuses[i] = { cls: 'status-ok', label: '✓ există deja' };
      } else {
        statuses[i] = { cls: 'status-err', label: '✗ ' + msg.slice(0, 30) };
      }
    }
    renderList(statuses);
    await new Promise(r => setTimeout(r, 300));
  }

  document.getElementById('startBtn').textContent = 'Gata';
  document.getElementById('startBtn').disabled = false;
  const allOk = statuses.every(s => s.cls === 'status-ok');
  if (allOk) document.getElementById('doneMsg').style.display = 'block';
});

checkAdminAuth();
</script>
</body>
</html>
